<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W14F2MPXMC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-W14F2MPXMC');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a14">
  <title>Dodge & Survive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-left">
      <div id="score">0</div>
      <div id="best">Best: 0</div>
    </div>
    <div class="hud-right">
      <div id="level-pill">LV <span id="level-num">1</span></div>
      <div id="powerups"></div>
    </div>
  </div>

  <div id="level-toast" class="hidden">
    <div class="lt-sub">LEVEL UP</div>
    <div class="lt-num">2</div>
  </div>

  <div id="gameover" class="hidden">
    <div class="go-card">
      <h1>GAME OVER</h1>
      <div class="go-score">Score <span id="final-score">0</span></div>
      <div class="go-best">Best <span id="final-best">0</span></div>
      <div id="unlock-banner" class="hidden">NEW SKIN UNLOCKED: <span id="unlock-name">—</span></div>
      <div class="go-share">Can your friend beat your score?</div>
      <button id="copy-challenge" type="button">Copy Challenge</button>
      <div class="go-hint" id="restart-hint">Tap to restart</div>
    </div>
  </div>

  <div id="start" class="overlay">
    <div class="go-card">
      <h1>DODGE &amp; SURVIVE</h1>
      <div class="skin-section">
        <div class="skin-label">CHOOSE SKIN</div>
        <div id="skin-picker"></div>
      </div>
      <div class="go-hint" id="start-hint">Tap to start</div>
    </div>
  </div>

  <div id="credit">Made by Kartik</div>

  <script src="script.js"></script>
</body>
</html>
